<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかねはかせクイズ</title>
<meta name="description" content="クイズにこたえて、お金のことをたのしく学ぼう！小学生向けのマネーリテラシークイズ">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20120%20120%22%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2260%22%20r%3D%2256%22%20fill%3D%22%23F7B32B%22%20stroke%3D%22%23E09B10%22%20stroke-width%3D%226%22/%3E%3Ccircle%20cx%3D%2260%22%20cy%3D%2260%22%20r%3D%2242%22%20fill%3D%22none%22%20stroke%3D%22%23FFD97A%22%20stroke-width%3D%224%22%20stroke-dasharray%3D%226%207%22/%3E%3Ccircle%20cx%3D%2245%22%20cy%3D%2254%22%20r%3D%225%22%20fill%3D%22%233E3226%22/%3E%3Ccircle%20cx%3D%2275%22%20cy%3D%2254%22%20r%3D%225%22%20fill%3D%22%233E3226%22/%3E%3Cpath%20d%3D%22M44%2072%20Q60%2084%2076%2072%22%20fill%3D%22none%22%20stroke%3D%22%233E3226%22%20stroke-width%3D%225%22%20stroke-linecap%3D%22round%22/%3E%3Ccircle%20cx%3D%2236%22%20cy%3D%2266%22%20r%3D%226%22%20fill%3D%22%23FF9D7A%22%20opacity%3D%22.7%22/%3E%3Ccircle%20cx%3D%2284%22%20cy%3D%2266%22%20r%3D%226%22%20fill%3D%22%23FF9D7A%22%20opacity%3D%22.7%22/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="おかねはかせクイズ">
<meta property="og:title" content="おかねはかせクイズ">
<meta property="og:description" content="クイズにこたえて、お金のことをたのしく学ぼう！小学生向けのマネーリテラシークイズ">
<meta property="og:url" content="https://mokayamo.github.io/okane-quiz/">
<meta property="og:image" content="https://mokayamo.github.io/okane-quiz/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF9E8;
    --card:#FFFFFF;
    --gold:#F7B32B;
    --gold-deep:#E09B10;
    --green:#2FBF71;
    --coral:#FF6B6B;
    --blue:#4D96FF;
    --purple:#9B6BFF;
    --ink:#3E3226;
    --ink-soft:#8A7B65;
    --radius:22px;
    --shadow:0 6px 0 rgba(62,50,38,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic",sans-serif;
    background:var(--bg);
    background-image:radial-gradient(circle at 20% 15%, rgba(247,179,43,.10) 0 90px, transparent 90px),
                     radial-gradient(circle at 85% 70%, rgba(77,150,255,.08) 0 120px, transparent 120px),
                     radial-gradient(circle at 70% 20%, rgba(47,191,113,.08) 0 70px, transparent 70px);
    color:var(--ink);
    display:flex;justify-content:center;
    min-height:100dvh;
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:560px;padding:20px 16px 48px;}

  /* ===== ミュートボタン ===== */
  .mute-btn{
    position:fixed;top:12px;right:12px;z-index:50;
    width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--card);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s ease;
  }
  .mute-btn svg{width:22px;height:22px;fill:none;stroke:var(--ink-soft);
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .mute-btn .icon-sound-off{display:none;}
  .mute-btn.muted .icon-sound-on{display:none;}
  .mute-btn.muted .icon-sound-off{display:block;}
  .mute-btn.muted svg{stroke:var(--coral);}
  .mute-btn:hover{transform:scale(1.08);}
  .mute-btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}

  /* ===== コインマスコット ===== */
  .coin{width:110px;height:110px;margin:0 auto;display:block;filter:drop-shadow(0 5px 0 rgba(62,50,38,.15));}
  .coin.small{width:60px;height:60px;}
  .coin-bounce{animation:bounce 1.6s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .coin-happy{animation:spinjump .7s ease;}
  @keyframes spinjump{0%{transform:scale(1) rotate(0)}40%{transform:scale(1.25) rotate(12deg)}70%{transform:scale(.95) rotate(-8deg)}100%{transform:scale(1) rotate(0)}}
  .coin-sad{animation:wobble .7s ease;}
  @keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
  .quiz-mascot{text-align:center;margin-bottom:10px;}

  /* ===== 画面切り替え ===== */
  .screen{display:none;animation:fadein .35s ease;}
  .screen.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ===== タイトル ===== */
  .title-badge{
    text-align:center;font-size:14px;font-weight:700;color:var(--gold-deep);
    letter-spacing:.35em;margin:14px 0 4px;
  }
  h1.title{text-align:center;font-size:34px;font-weight:900;line-height:1.3;margin-bottom:6px;}
  h1.title .accent{color:var(--gold-deep);}
  .subtitle{text-align:center;font-size:14px;color:var(--ink-soft);margin-bottom:24px;}

  .theme-label{font-size:15px;font-weight:700;text-align:center;margin-bottom:14px;}
  .theme-cards{display:flex;flex-direction:column;gap:14px;}
  .theme-card{
    display:flex;align-items:center;gap:14px;
    background:var(--card);border:3px solid transparent;border-radius:var(--radius);
    padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .12s ease,border-color .12s ease;
    font-family:inherit;text-align:left;width:100%;
  }
  .theme-card:hover,.theme-card:focus-visible{transform:translateY(-3px);}
  .theme-card:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
  .theme-card:active{transform:translateY(1px);}
  .theme-emoji{
    width:58px;height:58px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .theme-emoji svg{width:32px;height:32px;}
  .theme-card:nth-child(1) .theme-emoji{background:#FFF1D6;}
  .theme-card:nth-child(1) .theme-emoji svg{stroke:var(--gold-deep);}
  .theme-card:nth-child(2) .theme-emoji{background:#E2F7EC;}
  .theme-card:nth-child(2) .theme-emoji svg{stroke:#1B8A4E;}
  .theme-card:nth-child(3) .theme-emoji{background:#E5EEFF;}
  .theme-card:nth-child(3) .theme-emoji svg{stroke:var(--blue);}
  .theme-card:nth-child(4) .theme-emoji{background:#F0E8FF;}
  .theme-card:nth-child(4) .theme-emoji svg{stroke:var(--purple);}
  .theme-emoji svg{fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .theme-card.mix{border:3px solid var(--purple);}
  .theme-name{display:block;font-size:17px;font-weight:900;line-height:1.35;}
  .theme-desc{display:block;font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
  .theme-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink-soft);flex-shrink:0;}

  /* ===== クイズ画面 ===== */
  .quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .quiz-theme{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:12px;}
  .back-btn{
    font-family:inherit;background:var(--card);border:none;border-radius:999px;
    padding:8px 16px 8px 12px;font-size:13.5px;font-weight:900;color:var(--ink-soft);
    cursor:pointer;box-shadow:var(--shadow);transition:transform .1s ease;
    display:inline-flex;align-items:center;gap:3px;
  }
  .back-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;
    stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .star-icon{width:15px;height:15px;fill:var(--gold);stroke:var(--gold-deep);
    stroke-width:1;vertical-align:-2px;margin-right:2px;}
  .back-btn:hover{transform:translateY(-2px);color:var(--ink);}
  .back-btn:active{transform:translateY(1px);}
  .back-btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}

  /* ===== かくにんモーダル ===== */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:80;
    background:rgba(62,50,38,.5);
    align-items:center;justify-content:center;padding:24px;
    animation:fadein .2s ease;
  }
  .modal-overlay.show{display:flex;}
  .modal-card{
    background:var(--card);border-radius:var(--radius);box-shadow:0 10px 0 rgba(62,50,38,.15);
    padding:28px 24px;text-align:center;max-width:340px;width:100%;
    animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-emoji{margin-bottom:8px;}
  .modal-emoji svg{width:56px;height:56px;}
  .modal-title{font-size:20px;font-weight:900;line-height:1.5;margin-bottom:8px;}
  .modal-note{font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-bottom:20px;}
  .modal-btns{display:flex;flex-direction:column;gap:10px;}
  .modal-btn{
    font-family:inherit;border:none;border-radius:999px;padding:14px;
    font-size:16px;font-weight:900;cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;
  }
  .modal-btn.stay{background:var(--gold);color:#fff;box-shadow:0 5px 0 var(--gold-deep);}
  .modal-btn.quit{background:#fff;color:var(--ink-soft);box-shadow:0 5px 0 rgba(62,50,38,.15);}
  .modal-btn:hover{transform:translateY(-2px);}
  .modal-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--gold-deep);}
  .modal-btn.quit:active{box-shadow:0 2px 0 rgba(62,50,38,.15);}
  .modal-btn:focus-visible{outline:3px solid var(--blue);outline-offset:3px;}
  .score-chip{
    background:var(--card);border-radius:999px;padding:6px 14px;font-size:14px;font-weight:900;
    box-shadow:var(--shadow);display:inline-flex;align-items:center;
  }
  .progress-track{background:#F0E6CC;border-radius:999px;height:14px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{
    height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--gold),var(--gold-deep));
    transition:width .4s ease;
  }
  .q-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:22px 20px;margin-bottom:16px;
  }
  .q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .q-num{font-size:13px;font-weight:900;color:var(--ink-soft);}
  .q-type{font-size:11.5px;font-weight:900;padding:4px 10px;border-radius:999px;color:#fff;}
  .q-type.ox{background:var(--coral);}
  .q-type.choice{background:var(--blue);}
  .q-text{font-size:19px;font-weight:900;line-height:2.1;}

  /* ===== ルビ(ふりがな) ===== */
  ruby{ruby-align:center;}
  rt{font-size:.5em;font-weight:700;color:var(--ink-soft);
     letter-spacing:0;user-select:none;}
  .ans-btn ruby rt{color:inherit;opacity:.75;}
  .fb-text{line-height:2;}
  .rv-q,.rv-a,.rv-exp{line-height:2;}

  .answers{display:flex;flex-direction:column;gap:12px;}
  .answers.ox-mode{flex-direction:row;}
  .ans-btn{
    font-family:inherit;width:100%;
    background:var(--card);border:3px solid #EFE7D2;border-radius:18px;
    padding:15px 16px;font-size:16.5px;font-weight:900;color:var(--ink);
    cursor:pointer;box-shadow:var(--shadow);text-align:left;
    transition:transform .1s ease,border-color .1s ease,background .15s ease;
    line-height:1.5;
  }
  .answers.ox-mode .ans-btn{text-align:center;font-size:46px;padding:20px 10px;line-height:1;}
  .answers.ox-mode .ans-btn .ox-label{display:block;font-size:13px;margin-top:8px;}
  .ans-btn:hover:not(:disabled),.ans-btn:focus-visible{transform:translateY(-2px);border-color:var(--gold);}
  .ans-btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
  .ans-btn:disabled{cursor:default;}
  .ans-btn.correct{background:#E2F7EC;border-color:var(--green);}
  .ans-btn.wrong{background:#FFE9E9;border-color:var(--coral);}
  .ans-btn.dim{opacity:.45;}
  .ox-maru{color:var(--coral);}
  .ox-batsu{color:var(--blue);}

  /* ===== フィードバック ===== */
  .feedback{display:none;margin-top:16px;animation:fadein .3s ease;}
  .feedback.show{display:block;}
  .fb-card{border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
  .fb-card.good{background:#E2F7EC;border:3px solid var(--green);}
  .fb-card.bad{background:#FFF3E0;border:3px solid var(--gold);}
  .fb-head{display:flex;align-items:center;gap:10px;font-size:21px;font-weight:900;margin-bottom:8px;}
  .fb-card.good .fb-head{color:#1B8A4E;}
  .fb-card.bad .fb-head{color:var(--gold-deep);}
  .fb-text{font-size:15px;line-height:1.8;font-weight:700;}
  .next-btn,.big-btn{
    font-family:inherit;display:block;width:100%;margin-top:16px;
    background:var(--gold);border:none;border-radius:999px;
    padding:16px;font-size:17px;font-weight:900;color:#fff;cursor:pointer;
    box-shadow:0 5px 0 var(--gold-deep);
    transition:transform .1s ease,box-shadow .1s ease;
  }
  .next-btn:hover,.big-btn:hover{transform:translateY(-2px);}
  .next-btn:active,.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--gold-deep);}
  .next-btn:focus-visible,.big-btn:focus-visible{outline:3px solid var(--blue);outline-offset:3px;}
  .big-btn.ghost{background:#fff;color:var(--ink);box-shadow:0 5px 0 rgba(62,50,38,.15);}

  /* ===== 結果画面 ===== */
  .result-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:30px 22px;text-align:center;margin-top:10px;
  }
  .result-label{font-size:14px;font-weight:700;color:var(--ink-soft);letter-spacing:.2em;}
  .result-score{font-size:46px;font-weight:900;margin:6px 0 2px;}
  .result-score span{font-size:20px;color:var(--ink-soft);}
  .best-line{font-size:13px;font-weight:700;color:var(--gold-deep);margin-top:2px;}
  .level-badge{
    display:inline-block;margin:14px 0 6px;padding:12px 26px;border-radius:999px;
    font-size:22px;font-weight:900;color:#fff;background:var(--gold);
    box-shadow:0 5px 0 var(--gold-deep);
  }
  .level-msg{font-size:14.5px;line-height:1.8;font-weight:700;color:var(--ink-soft);margin-top:10px;}

  /* ===== おさらい ===== */
  .review{margin-top:22px;text-align:left;}
  .review-title{font-size:15px;font-weight:900;margin-bottom:10px;text-align:center;}
  .rv-item{
    background:#FFF6E3;border:2px solid #F0E2BE;border-radius:16px;
    padding:14px 16px;margin-bottom:10px;
  }
  .rv-q{font-size:14px;font-weight:900;line-height:1.7;}
  .rv-a{font-size:13.5px;font-weight:900;color:#1B8A4E;margin-top:8px;}
  .rv-exp{font-size:13px;font-weight:700;color:var(--ink-soft);line-height:1.7;margin-top:4px;}
  .review-perfect{
    background:#E2F7EC;border:2px solid var(--green);border-radius:16px;
    padding:14px;font-size:14px;font-weight:900;color:#1B8A4E;text-align:center;
  }

  /* ===== かみふぶき ===== */
  .confetti{position:fixed;top:-14px;border-radius:3px;pointer-events:none;z-index:99;
    animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9;}}

  /* ===== コレクションちょうボタン(タイトル画面) ===== */
  .collection-btn{
    font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;margin-top:18px;background:#fff;border:3px solid var(--gold);
    border-radius:999px;padding:14px;font-size:15.5px;font-weight:900;color:var(--gold-deep);
    cursor:pointer;box-shadow:var(--shadow);transition:transform .1s ease;
  }
  .collection-btn svg{width:20px;height:20px;fill:none;stroke:var(--gold-deep);
    stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .collection-btn:hover{transform:translateY(-2px);}
  .collection-btn:active{transform:translateY(1px);}
  .collection-btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}

  /* ===== コースタブ ===== */
  .course-tabs{display:flex;gap:10px;margin-bottom:16px;}
  .course-tab{flex:1;font-family:inherit;border:3px solid #EFE7D2;background:#fff;
    border-radius:999px;padding:11px;font-size:14.5px;font-weight:900;color:var(--ink-soft);
    cursor:pointer;box-shadow:var(--shadow);transition:transform .1s ease;}
  .course-tab.active{background:var(--gold);border-color:var(--gold-deep);color:#fff;
    box-shadow:0 5px 0 var(--gold-deep);}
  .course-tab:hover{transform:translateY(-2px);}
  .course-tab:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
  .course-head{font-size:14.5px;font-weight:900;margin:8px 0 2px;}

  /* ===== マイページ ===== */
  .mypage-head{display:flex;align-items:center;gap:10px;margin:6px 0 4px;}
  .mypage-title{font-size:18px;font-weight:900;}
  .mypage-progress{font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-bottom:18px;}
  .collection{display:flex;flex-direction:column;gap:16px;}

  .theme-block{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 18px 20px;
  }
  .theme-block.mix-block{border:2px solid #E7DBFF;}
  .theme-block-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .theme-block-name{font-size:15.5px;font-weight:900;}
  .theme-block-best{margin-left:auto;font-size:12.5px;font-weight:900;color:var(--ink-soft);
    background:#F5EEDA;border-radius:999px;padding:4px 12px;}
  .medal-row{display:flex;justify-content:space-around;gap:8px;margin-top:12px;}
  .medal{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
  .medal svg{width:62px;height:62px;}
  .medal-name{font-size:12px;font-weight:900;}
  .medal.got .medal-name{color:var(--ink);}
  .medal.locked .medal-name{color:#C9BEA8;}
  .medal.locked svg{filter:grayscale(1);opacity:.42;}
  .medal.got svg{animation:medalpop .5s ease;}
  @keyframes medalpop{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .medal-need{font-size:11px;font-weight:700;color:#C9BEA8;line-height:1.7;text-align:center;}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important;transition:none !important;}
  }
  @media (max-width:400px){
    h1.title{font-size:28px;}
    .q-text{font-size:17.5px;}
    .medal svg{width:54px;height:54px;}
  }
</style>
</head>
<body>
<button class="mute-btn" id="mute-btn" aria-label="音のオン・オフ">
    <svg class="icon-sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M16 8.5a4 4 0 0 1 0 7"/><path d="M18.5 6a7 7 0 0 1 0 12"/></svg>
    <svg class="icon-sound-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M17 9.5l4 5M21 9.5l-4 5"/></svg>
  </button>
<div class="wrap">

  <!-- ============ タイトル画面 ============ -->
  <section class="screen active" id="screen-title">
    <svg class="coin coin-bounce" viewBox="0 0 120 120" aria-hidden="true">
      <circle cx="60" cy="60" r="56" fill="#F7B32B" stroke="#E09B10" stroke-width="6"/>
      <circle cx="60" cy="60" r="42" fill="none" stroke="#FFD97A" stroke-width="4" stroke-dasharray="6 7"/>
      <circle cx="45" cy="54" r="5" fill="#3E3226"/>
      <circle cx="75" cy="54" r="5" fill="#3E3226"/>
      <path d="M44 72 Q60 84 76 72" fill="none" stroke="#3E3226" stroke-width="5" stroke-linecap="round"/>
      <circle cx="36" cy="66" r="6" fill="#FF9D7A" opacity=".7"/>
      <circle cx="84" cy="66" r="6" fill="#FF9D7A" opacity=".7"/>
    </svg>

  silver: { min:9,  times:3, cond:"9<ruby>点<rt>てん</rt></ruby><ruby>以上<rt>いじょう</rt></ruby>" },

function medalRule(ti, key){
  return (ti === MIX_INDEX ? MEDALS_MIX : MEDALS)[key];
}
// テーマごとの「たっせい回数」(5点以上・7点以上・満点を それぞれ何回 取ったか)
function medalCounts(courseKey, ti){
  const c = saveData.courses[courseKey];
  if(!c.counts) c.counts = {};
  if(!c.counts[ti]) c.counts[ti] = { bronze:0, silver:0, gold:0 };
  return c.counts[ti];
}
// メダルを もっているか(きめられた 回数 たっせいすると かくとく)
function hasMedal(counts, medalKey, ti){
  if(!counts) return false;
  return (counts[medalKey] || 0) >= medalRule(ti, medalKey).times;
}

// ================= シャッフル =================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// もんだいをコピーして、4たくの えらびかたの じゅんばんも シャッフルする
function prepareQuestion(q){
  if(q.type !== "choice") return {...q};
  const order = shuffle(q.choices.map((_,i)=>i));
  return {
    ...q,
    choices: order.map(i=>q.choices[i]),
    answer: order.indexOf(q.answer)
  };
}

function buildSession(){
  let pool;
  if(themeIdx === MIX_INDEX){
    pool = shuffle(THEMES.flatMap(t=>t.questions).slice()).slice(0, MIX_COUNT);
  }else{
    pool = shuffle(THEMES[themeIdx].questions.slice()).slice(0, THEME_COUNT);
  }
  return pool.map(prepareQuestion);
}

// ================= 効果音(Web Audio) =================
let audioCtx = null;
let muted = false;

function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq, dur, delay=0, type="sine", vol=0.12){
  if(muted || !audioCtx) return;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.05);
}
function playCorrect(){ beep(659,.13); beep(880,.22,.13); }
function playWrong(){ beep(247,.2,0,"triangle",.1); beep(196,.28,.18,"triangle",.1); }
function playTap(){ beep(523,.08,0,"sine",.06); }
function playFanfare(){
  [523,659,784,1047].forEach((f,i)=>beep(f,.18,i*0.14));
  beep(1319,.4,.6);
}

      const b = document.createElement("button");
      b.className = "ans-btn";
      b.innerHTML = `<span class="${l.cls}">${l.mark}</span><span class="ox-label">${l.text}</span>`;
      b.addEventListener("click",()=>answer(i));
      ansWrap.appendChild(b);
    });
  }else{
    q.choices.forEach((c,i)=>{
      const b = document.createElement("button");
      b.className = "ans-btn";
      b.innerHTML = ["①","②","③","④"][i] + " " + c;
      b.addEventListener("click",()=>answer(i));
      ansWrap.appendChild(b);
    });
  }

  $("feedback").classList.remove("show");
}

// ================= こたえあわせ =================
function answer(selected){
  ensureAudio();
  const q = sessionQuestions[qIdx];
  const buttons = document.querySelectorAll(".ans-btn");
  buttons.forEach(b=>b.disabled = true);

  const correct = selected === q.answer;
  buttons.forEach((b,i)=>{
    if(i === q.answer) b.classList.add("correct");
    else if(i === selected) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const fbCard = $("fb-card"), fbHead = $("fb-head"), fbText = $("fb-text");
  if(correct){
    score++;
    $("score").textContent = score;
    fbCard.className = "fb-card good";
    fbHead.innerHTML = "<ruby>正解<rt>せいかい</rt></ruby>!";
    coinFace("happy");
    playCorrect();
    confetti();
  }else{
    fbCard.className = "fb-card bad";
    fbHead.innerHTML = "<ruby>残念<rt>ざんねん</rt></ruby>! でも <ruby>大丈夫<rt>だいじょうぶ</rt></ruby>";
    coinFace("sad");
    playWrong();
    wrongList.push(q);
    setTimeout(()=>coinFace("normal"), 900); // すぐげんきになる
  }
  fbText.innerHTML = q.exp;
  $("feedback").classList.add("show");
  $("next-btn").innerHTML = (qIdx === sessionQuestions.length-1) ? "<ruby>結果<rt>けっか</rt></ruby>を <ruby>見<rt>み</rt></ruby>る ▶" : "<ruby>次<rt>つぎ</rt></ruby>の<ruby>問題<rt>もんだい</rt></ruby>へ ▶";
  $("next-btn").focus();
}

$("next-btn").addEventListener("click",()=>{
  playTap();
  qIdx++;
  if(qIdx >= sessionQuestions.length){
    showResult();
  }else{
    renderQuestion();
  }
});

// ================= けっか =================
function correctAnswerText(q){
  if(q.type === "ox") return q.answer === 0 ? "○(<ruby>合<rt>あ</rt></ruby>ってる)" : "×(<ruby>間違<rt>まちが</rt></ruby>い)";
  return q.choices[q.answer];
}

function showResult(){
  const total = sessionQuestions.length;
  $("progress").style.width = "100%";
  $("result-score").textContent = score;
  $("result-total").innerHTML = ` / ${total}<ruby>点<rt>てん</rt></ruby>`;

  // さいこうきろく と メダル(テーマモードのときだけ きろくする。ミックスはのぞく)
  {
    const scores = curScores();
    if(scores[themeIdx] === undefined || score > scores[themeIdx]){
      scores[themeIdx] = score;   // さいこうきろく(ひょうじ用)
    }
    // とどいた だんかいの 回数を ふやす(ミックスは ややきつめの じょうけん)
    const counts = medalCounts(COURSES[courseIdx].key, themeIdx);
    const before = MEDAL_KEYS.filter(k => hasMedal(counts, k, themeIdx));
    MEDAL_KEYS.forEach(k => { if(score >= medalRule(themeIdx, k).min) counts[k]++; });
    writeSave();
    const newly = MEDAL_KEYS.filter(k => hasMedal(counts, k, themeIdx) && !before.includes(k));
    if(newly.length){
      const top = newly[newly.length - 1];
      $("best-line").innerHTML = `${MEDALS[top].label}メダル ゲット!`;
    }else{
      const next = MEDAL_KEYS.find(k => !hasMedal(counts, k, themeIdx));
      if(next){
        const m = medalRule(themeIdx, next);
        const rest = m.times - (counts[next] || 0);
        $("best-line").innerHTML = `${MEDALS[next].label}メダルまで ${m.cond} あと${rest}<ruby>回<rt>かい</rt></ruby>!`;
      }else{
        $("best-line").innerHTML = `メダル コンプリート! <ruby>今<rt>いま</rt></ruby>までの <ruby>最高<rt>さいこう</rt></ruby>: ${scores[themeIdx]}<ruby>点<rt>てん</rt></ruby>`;
      }
    }
  }

  // レベルはんてい(せいかいりつで きめる)
  const rate = score / total;
  let lv;
  if(rate === 1)        lv = {name:"お<ruby>金<rt>かね</rt></ruby><ruby>博士<rt>はかせ</rt></ruby>", msg:"パーフェクト! <ruby>君<rt>きみ</rt></ruby>は もう <ruby>立派<rt>りっぱ</rt></ruby>な お<ruby>金<rt>かね</rt></ruby><ruby>博士<rt>はかせ</rt></ruby>! おうちの<ruby>人<rt>ひと</rt></ruby>にも <ruby>自慢<rt>じまん</rt></ruby>しちゃおう!"};
  else if(rate >= .75)  lv = {name:"お<ruby>金<rt>かね</rt></ruby>マスター", msg:"すごい! お<ruby>金<rt>かね</rt></ruby>のことが よくわかっているね。<ruby>博士<rt>はかせ</rt></ruby>まで あと<ruby>少<rt>すこ</rt></ruby>し!"};
  else if(rate >= .5)   lv = {name:"お<ruby>金<rt>かね</rt></ruby><ruby>見習<rt>みなら</rt></ruby>い", msg:"いい<ruby>調子<rt>ちょうし</rt></ruby>! <ruby>下<rt>した</rt></ruby>の「おさらい」を <ruby>読<rt>よ</rt></ruby>んでから もう<ruby>一度<rt>いちど</rt></ruby> やってみよう!"};
  else                  lv = {name:"チャレンジャー", msg:"クイズに <ruby>挑戦<rt>ちょうせん</rt></ruby>したことが <ruby>素晴<rt>すば</rt></ruby>らしい! おさらいを <ruby>読<rt>よ</rt></ruby>めば、<ruby>次<rt>つぎ</rt></ruby>は きっと <ruby>正解<rt>せいかい</rt></ruby>が <ruby>増<rt>ふ</rt></ruby>えるよ!"};
  $("level-badge").innerHTML = lv.name;
  $("level-msg").innerHTML = lv.msg;

  // まちがえたもんだいの おさらい
  const rv = $("review");
  rv.innerHTML = "";
  if(wrongList.length === 0){
    rv.innerHTML = `<div class="review-perfect"><ruby>全問<rt>ぜんもん</rt></ruby> <ruby>正解<rt>せいかい</rt></ruby>! おさらいは なしだよ!</div>`;
  }else{
    const title = document.createElement("p");
    title.className = "review-title";
    title.innerHTML = `<ruby>間違<rt>まちが</rt></ruby>えた <ruby>問題<rt>もんだい</rt></ruby>の おさらい(${wrongList.length}<ruby>問<rt>もん</rt></ruby>)`;
    rv.appendChild(title);
    wrongList.forEach(q=>{
      const item = document.createElement("div");
      item.className = "rv-item";
      const qEl = document.createElement("p"); qEl.className="rv-q"; qEl.innerHTML = "Q. " + q.q;
      const aEl = document.createElement("p"); aEl.className="rv-a"; aEl.innerHTML = "<ruby>答<rt>こた</rt></ruby>え: " + correctAnswerText(q);
      const eEl = document.createElement("p"); eEl.className="rv-exp"; eEl.innerHTML = q.exp;
      item.append(qEl,aEl,eEl);
      rv.appendChild(item);
    });
  }

  show("result");
  if(rate >= .75){ confetti(60); playFanfare(); }
}

// ================= マイページ(コレクションちょう) =================
// メダルのSVGを つくる。got=もっているか, key=bronze/silver/gold
function medalSVG(key, got){
  const m = MEDALS[key];
  const c   = got ? m.color : "#D8D0BE";
  const lt  = got ? m.light : "#EDE7D6";
  const ring= got ? m.ring  : "#C3B9A2";
  // まるいメダル + リボン
  return `<svg viewBox="0 0 64 64" aria-hidden="true">
    <path d="M22 6 L28 30 L20 30 Z" fill="${got?'#6FA8DC':'#CBC3B0'}"/>
    <path d="M42 6 L36 30 L44 30 Z" fill="${got?'#E06666':'#CBC3B0'}"/>
    <circle cx="32" cy="40" r="20" fill="${lt}" stroke="${ring}" stroke-width="3"/>
    <circle cx="32" cy="40" r="13" fill="${c}" stroke="${ring}" stroke-width="2"/>
    <path d="M32 33 l1.8 3.7 4 .6-2.9 2.8.7 4-3.6-1.9-3.6 1.9.7-4-2.9-2.8 4-.6Z"
      fill="${got?'#FFFFFF':'#E5DFCE'}" opacity="${got?0.95:0.7}"/>
  </svg>`;
}

// コレクションちょうを かきかえる(コースごとに ひょうじ)
function renderCollection(){
  const wrap = $("collection");
  wrap.innerHTML = "";
  const medalKeys = MEDAL_KEYS;
  let totalGot = 0;
  const slots = [0, 1, 2, MIX_INDEX];   // 3テーマ + ミックスクイズ
  const totalAll = COURSES.length * slots.length * medalKeys.length;  // 2×4×3 = 24

  COURSES.forEach(course=>{
    const scores = saveData.courses[course.key].bestScores;
    let courseGot = 0;
    const head = document.createElement("p");
    head.className = "course-head";
    wrap.appendChild(head);

    slots.forEach(ti=>{
      const isMix = (ti === MIX_INDEX);
      const best = scores[ti];
      const block = document.createElement("div");
      block.className = "theme-block" + (isMix ? " mix-block" : "");

      const top = document.createElement("div");
      top.className = "theme-block-top";
      const nameEl = document.createElement("span");
      nameEl.className = "theme-block-name";
      nameEl.innerHTML = isMix ? "ミックスクイズ" : course.themes[ti].name;
      const bestEl = document.createElement("span");
      bestEl.className = "theme-block-best";
      bestEl.innerHTML = (best !== undefined) ? `<ruby>最高<rt>さいこう</rt></ruby> ${best}<ruby>点<rt>てん</rt></ruby>` : "<ruby>未<rt>み</rt></ruby>プレイ";
      top.append(nameEl, bestEl);
      block.appendChild(top);

      const row = document.createElement("div");
      row.className = "medal-row";
      const counts = medalCounts(course.key, ti);
      medalKeys.forEach(key=>{
        const rule = medalRule(ti, key);
        const got = hasMedal(counts, key, ti);
        if(got) courseGot++;
        const cell = document.createElement("div");
        cell.className = "medal " + (got ? "got" : "locked");
        cell.innerHTML = medalSVG(key, got) +
          `<span class="medal-name">${MEDALS[key].label}</span>` +
          (got ? "" : `<span class="medal-need">${rule.cond} ${counts[key] || 0}/${rule.times}</span>`);
        row.appendChild(cell);
      });
      block.appendChild(row);
      wrap.appendChild(block);
    });

    head.innerHTML = `${course.label}コース  メダル ${courseGot} / ${slots.length * medalKeys.length}<ruby>個<rt>こ</rt></ruby>`;
    totalGot += courseGot;
  });

  $("mypage-progress").innerHTML = `<ruby>全部<rt>ぜんぶ</rt></ruby>で メダル ${totalGot} / ${totalAll}<ruby>個<rt>こ</rt></ruby> <ruby>集<rt>あつ</rt></ruby>めたよ!`;
}

function openMypage(){
  playTap();
  renderCollection();
  show("mypage");
}

$("retry-btn").addEventListener("click", ()=>{ playTap(); startQuiz(); });
$("home-btn").addEventListener("click", ()=>{ playTap(); show("title"); });
$("open-mypage").addEventListener("click", openMypage);
$("result-mypage").addEventListener("click", openMypage);
$("mypage-back").addEventListener("click", ()=>{ playTap(); show("title"); });

// ================= かみふぶき =================
function confetti(count = 28){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const colors = ["#F7B32B","#2FBF71","#FF6B6B","#4D96FF","#FFD97A","#FF9D7A"];
  for(let i=0;i<count;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    const size = 6 + Math.random()*8;
    c.style.left = Math.random()*100 + "vw";
    c.style.width = size + "px";
    c.style.height = size*0.6 + "px";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (1.4 + Math.random()*1.4) + "s";
    c.style.animationDelay = (Math.random()*0.3) + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3200);
  }
}

selectCourse(saveData.lastCourse || 0);
